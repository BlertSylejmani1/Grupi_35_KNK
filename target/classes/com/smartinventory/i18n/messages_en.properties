help.text=Smart Inventory System Help\n\nProducts: use Add/Edit/Delete for inventory records. The search fields filter live by name, category, supplier, price range, and stock range.\n\nStock: low-stock and out-of-stock rows are highlighted. Admins can adjust stock manually with a reason; every change is saved in Stock History.\n\nSuppliers: admins can manage supplier contact data and link suppliers to products.\n\nPurchase Orders: create reorders for low-stock products, approve pending orders, then receive approved orders to add quantities into stock automatically.\n\nQR Codes: select a product and press QR Code. The scanned phone text shows ID, name, category, supplier, price, stock, and status.\n\nReports: view KPIs, charts, activity feed, and export PDF or Excel reports.\n\nNotifications: low-stock and out-of-stock alerts are recorded, and email can be enabled in email.properties.\n\nSecurity: employee accounts can view operational data; admins can change inventory, suppliers, users, and orders. The app locks accounts after failed login attempts and logs out after inactivity.
