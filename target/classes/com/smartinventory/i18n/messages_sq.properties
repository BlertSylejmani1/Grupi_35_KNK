help.text=Ndihme per Smart Inventory System\n\nProduktet: perdor Shto/Ndrysho/Fshi per inventarin. Fushat e kerkimit filtrojne live sipas emrit, kategorise, furnitorit, cmimit dhe stokut.\n\nStoku: produktet me stok te ulet ose pa stok ngjyrosen. Admini mund ta rregulloje stokun manualisht me arsye; cdo ndryshim ruhet ne Historine e Stokut.\n\nFurnitoret: admini mund te menaxhoje te dhenat e furnitoreve dhe t'i lidhe me produkte.\n\nPorosite: krijo porosi per produktet me stok te ulet, aprovo porosite pending, pastaj prano porosite approved per ta shtuar sasine ne stok automatikisht.\n\nKodet QR: zgjedh produktin dhe shtyp Kodi QR. Telefoni shfaq ID, emrin, kategorine, furnitorin, cmimin, stokun dhe statusin.\n\nRaportet: shfaq KPI, grafike, aktivitetet e fundit dhe eksport PDF/Excel.\n\nNjoftimet: alarmet per low/out of stock ruhen, dhe email mund te aktivizohet ne email.properties.\n\nSiguria: employee mund te shohe te dhenat; admini mund te ndryshoje inventarin, furnitoret, userat dhe porosite. Aplikacioni bllokon llogarine pas tentimeve te deshtuara dhe ben logout pas pasivitetit.
